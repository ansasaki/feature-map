<!DOCTYPE html>
<html lang="en">

    <a href="roadmap.html" class="nav-link">Roadmap</a>

<div id="app">
  <div id="sidebar"></div>
  <div id="main">
    <div id="controls-bar">
      <input type="text" id="search-input" placeholder="Search features...">
      <div id="group-controls">
        <label for="group-select">Group by:</label>
        <select id="group-select">
          <option value="sector">Sector</option>
          <option value="status">Status</option>
          <option value="ring">Ring</option>
          <option value="none">None</option>
        </select>
      </div>
      <span id="feature-count"></span>
    </div>
    <div id="features-container"></div>
    <div id="detail-panel"><button id="detail-close">&times;</button><div id="detail-content"></div></div>
    <div id="error-msg"></div>
  </div>
